services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tradeskills
      POSTGRES_USER: tradeskills
      POSTGRES_PASSWORD: tradeskills
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradeskills -d tradeskills"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  agent-runner:
    build:
      context: ../../..
      dockerfile: services/agent-runner/Dockerfile
    env_file:
      - ../../env/agent-runner.env.example
    ports:
      - "8100:8100"

  api:
    build:
      context: ../../..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../../env/api.env.example
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8000:8000"
    volumes:
      - ../../../data:/app/data
    depends_on:
      - postgres
      - agent-runner
      - redis

  market-sync-worker:
    build:
      context: ../../..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../../env/api.env.example
    command: ["python", "-m", "app.runtime.market_sync_worker"]
    volumes:
      - ../../../data:/app/data
    depends_on:
      - postgres
      - redis
      - api

  web:
    build:
      context: ../../..
      dockerfile: apps/web/Dockerfile
    env_file:
      - ../../env/web.env.example
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres-data:
